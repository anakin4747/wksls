name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-commits:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: cachix/install-nix-action@v27

      - name: Check conventional commits (pull request)
        if: github.event_name == 'pull_request'
        run: |
          BASE=${{ github.event.pull_request.base.sha }}
          HEAD=${{ github.event.pull_request.head.sha }}
          nix run nixpkgs#cocogitto -- check "$BASE..$HEAD"

      - name: Check conventional commits (push)
        if: github.event_name == 'push'
        run: nix run nixpkgs#cocogitto -- check "${{ github.event.before }}..${{ github.event.after }}"

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: cachix/install-nix-action@v27

      - name: Build and test
        run: make
